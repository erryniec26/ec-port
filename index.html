<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Errynie Cyril — Data Analyst</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700&family=Syne:wght@400;600;700;800&family=Press+Start+2P&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #03050a;
    --bg2: #060a0f;
    --card: #080e18;
    --card2: #0a1220;
    --border: #131f2e;
    --border2: #1a2a3a;
    --cyan: #00e5ff;
    --cyan-dim: rgba(0,229,255,0.08);
    --cyan-glow: rgba(0,229,255,0.3);
    --green: #39ff14;
    --green-dim: rgba(57,255,20,0.07);
    --text: #c8dce8;
    --text-dim: #7a9ab0;
    --white: #e8f2f8;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Syne', sans-serif;
    overflow-x: hidden;
    cursor: none;
  }

  /* NOISE */
  body::before {
    content: ''; position: fixed; inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
    pointer-events: none; z-index: 999; opacity: 0.5;
  }

  /* MATRIX */
  #matrix-canvas {
    position: fixed; top: 0; left: 0;
    width: 100%; height: 100%;
    z-index: 0; opacity: 0.09; pointer-events: none;
  }

  /* GRID */
  .grid-bg {
    position: fixed; inset: 0;
    background-image:
      linear-gradient(rgba(0,229,255,0.018) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,229,255,0.018) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none; z-index: 0;
  }

  /* ORBS */
  .orb {
    position: fixed; border-radius: 50%; pointer-events: none;
    z-index: 0; filter: blur(120px); opacity: 0.05;
    animation: orbFloat 9s ease-in-out infinite alternate;
  }
  .orb-1 { width: 700px; height: 700px; background: var(--cyan); top: -200px; left: -200px; }
  .orb-2 { width: 400px; height: 400px; background: var(--green); bottom: 5%; right: -100px; animation-delay: 4s; }
  .orb-3 { width: 300px; height: 300px; background: var(--cyan); bottom: 30%; left: 40%; animation-delay: 6s; opacity: 0.03; }
  @keyframes orbFloat {
    from { transform: translate(0,0) scale(1); }
    to   { transform: translate(25px,35px) scale(1.06); }
  }

  /* CURSOR */
  .cursor-dot {
    width: 7px; height: 7px; background: var(--cyan); border-radius: 50%;
    position: fixed; pointer-events: none; z-index: 9999;
    box-shadow: 0 0 10px var(--cyan-glow); transform: translate(-50%,-50%);
  }
  .cursor-ring {
    width: 30px; height: 30px; border: 1px solid rgba(0,229,255,0.35);
    border-radius: 50%; position: fixed; pointer-events: none; z-index: 9998;
    transform: translate(-50%,-50%); transition: width .3s, height .3s, border-color .3s;
  }
  .cursor-ring.hovering { width: 50px; height: 50px; border-color: var(--cyan); }
  @media (pointer:coarse) { .cursor-dot,.cursor-ring { display:none; } body { cursor:auto; } }

  /* NAV */
  nav {
    position: fixed; top: 0; left: 0; right: 0; z-index: 100;
    display: flex; align-items: center;
    padding: 1.2rem 3rem;
    background: rgba(3,5,10,0.92); backdrop-filter: blur(16px);
    border-bottom: 1px solid var(--border); transition: padding .3s;
  }
  nav.scrolled { padding: .85rem 3rem; }
  .nav-logo {
    text-decoration: none; flex-shrink: 0;
    display: flex; align-items: center; gap: .6rem;
  }
  .nav-links { flex-shrink: 0; margin-left: auto; }
  .nav-logo-ball {
    position: relative; width: 32px; height: 32px; border-radius: 50%;
    border: 2px solid var(--cyan); box-shadow: 0 0 12px var(--cyan-glow);
    overflow: hidden; flex-shrink: 0;
    transition: box-shadow .3s, transform .3s;
  }
  .nav-logo:hover .nav-logo-ball { box-shadow: 0 0 24px var(--cyan-glow), 0 0 40px rgba(0,229,255,.2); transform: rotate(20deg); }
  .nav-logo-ball::before {
    content: ''; position: absolute; top: 0; left: 0; right: 0; height: 50%;
    background: var(--cyan); opacity: .85;
  }
  .nav-logo-ball::after {
    content: ''; position: absolute; top: 50%; left: 50%;
    transform: translate(-50%,-50%);
    width: 10px; height: 10px; border-radius: 50%;
    background: var(--bg); border: 2px solid var(--cyan);
    box-shadow: 0 0 6px var(--cyan-glow); z-index: 2;
  }
  .nav-logo-divider {
    position: absolute; top: 50%; left: 0; right: 0;
    height: 2px; background: var(--cyan); transform: translateY(-50%); z-index: 1;
  }
  .nav-logo-text {
    font-family: 'Space Mono', monospace; color: var(--cyan);
    font-size: .85rem; font-weight: 700; letter-spacing: .12em;
    text-shadow: 0 0 14px var(--cyan-glow);
  }
  .nav-links { display: flex; gap: 2rem; list-style: none; }
  .nav-links a {
    color: #7a9ab0; text-decoration: none;
    font-size: .78rem; font-weight: 600;
    letter-spacing: .1em; text-transform: uppercase;
    transition: color .2s; position: relative;
  }
  .nav-links a::after {
    content: ''; position: absolute; bottom: -3px; left: 0; right: 0;
    height: 1px; background: var(--cyan);
    transform: scaleX(0); transition: transform .25s;
  }
  .nav-links a:hover { color: var(--cyan); }
  .nav-links a:hover::after { transform: scaleX(1); }

  /* POKEMON RUNNER */
  .nav-pokemon-track {
    flex: 1;
    position: relative;
    align-self: stretch; /* fill nav height */
    min-height: 52px;
    pointer-events: none; overflow: hidden;
    z-index: 1;
    margin: 0 12px; /* gap from logo and nav links */
  }
  .nav-pokemon {
    position: absolute; top: 50%;
    image-rendering: pixelated; image-rendering: crisp-edges;
    width: 36px; height: 36px;
    animation: pokemonRun 10s linear infinite, spriteWalk .3s ease-in-out infinite;
    filter: drop-shadow(0 0 4px var(--cyan-glow));
  }
  .nav-pokemon:nth-child(2) { animation-delay: -3.3s; width: 30px; height: 30px; }
  .nav-pokemon:nth-child(3) { animation-delay: -6.6s; width: 26px; height: 26px; filter: drop-shadow(0 0 4px rgba(57,255,20,0.5)); }

  @keyframes pokemonRun {
    0%   { left: 105%; }
    100% { left: -60px; }
  }
  @keyframes spriteWalk {
    0%, 100% { transform: translateY(-50%) scaleY(1); }
    50%       { transform: translateY(-52%) scaleY(0.96); }
  }

  /* POKEBALL THROW */
  .nav-logo { position: relative; z-index: 2; }
  .nav-logo-ball {
    cursor: pointer;
    pointer-events: auto;
    -webkit-tap-highlight-color: transparent;
  }
  .nav-logo-ball.throwing {
    animation: logoThrow .5s cubic-bezier(.34,1.56,.64,1) forwards !important;
  }
  @keyframes logoThrow {
    0%   { transform: rotate(0deg) scale(1); }
    30%  { transform: rotate(-30deg) scale(1.2); }
    60%  { transform: rotate(720deg) scale(0.85) translateX(30px); }
    100% { transform: rotate(360deg) scale(1); }
  }

  /* Flying pokeball projectile */
  .pokeball-projectile {
    position: fixed; z-index: 9997;
    width: 20px; height: 20px; border-radius: 50%;
    border: 2px solid var(--cyan);
    overflow: hidden; pointer-events: none;
    box-shadow: 0 0 12px var(--cyan-glow);
    display: none;
  }
  .pokeball-projectile::before {
    content: ''; position: absolute; top: 0; left: 0; right: 0; height: 50%;
    background: var(--cyan); opacity: .85;
  }
  .pokeball-projectile::after {
    content: ''; position: absolute; top: 50%; left: 50%;
    transform: translate(-50%,-50%);
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--bg); border: 1.5px solid var(--cyan); z-index: 2;
  }
  .pokeball-projectile.flying {
    display: block;
    animation: pokeballFly .55s cubic-bezier(.2,.8,.4,1) forwards;
  }
  @keyframes pokeballFly {
    0%   { transform: rotate(0deg) scale(1); opacity: 1; }
    70%  { transform: rotate(540deg) scale(1.1); opacity: 1; }
    85%  { transform: rotate(600deg) scale(1.4); opacity: 1; }
    100% { transform: rotate(640deg) scale(0); opacity: 0; }
  }

  /* Caught flash */
  .pokemon-caught-flash {
    position: fixed; z-index: 9996;
    width: 60px; height: 60px; border-radius: 50%;
    background: radial-gradient(circle, rgba(0,229,255,.9) 0%, transparent 70%);
    pointer-events: none; display: none;
    transform: translate(-50%, -50%) scale(0);
  }
  .pokemon-caught-flash.burst {
    display: block;
    animation: caughtBurst .5s ease-out forwards;
  }
  @keyframes caughtBurst {
    0%   { transform: translate(-50%,-50%) scale(0); opacity: 1; }
    60%  { transform: translate(-50%,-50%) scale(1.5); opacity: .8; }
    100% { transform: translate(-50%,-50%) scale(2.5); opacity: 0; }
  }

  /* "Gotcha!" popup */
  .gotcha-popup {
    position: fixed; z-index: 9998;
    font-family: 'Press Start 2P', monospace; font-size: .45rem;
    color: var(--cyan); background: rgba(3,5,10,.92);
    border: 1px solid var(--cyan); border-radius: 3px;
    padding: .35rem .7rem; pointer-events: none; display: none;
    box-shadow: 0 0 16px var(--cyan-glow); letter-spacing: .08em;
    transform: translate(-50%, -150%);
  }
  .gotcha-popup.show {
    display: block;
    animation: gotchaAnim 1.4s ease forwards;
  }
  @keyframes gotchaAnim {
    0%   { opacity: 0; transform: translate(-50%, -120%) scale(.7); }
    20%  { opacity: 1; transform: translate(-50%, -150%) scale(1.1); }
    70%  { opacity: 1; transform: translate(-50%, -150%) scale(1); }
    100% { opacity: 0; transform: translate(-50%, -180%) scale(.9); }
  }

  /* HERO */
  #hero {
    position: relative; z-index: 1; min-height: 100vh;
    display: flex; flex-direction: column; justify-content: center;
    padding: 8rem 3rem 4rem; max-width: 1100px; margin: 0 auto;
  }
  .hero-tag {
    font-family: 'Space Mono', monospace; font-size: .75rem;
    color: var(--cyan); letter-spacing: .2em; text-transform: uppercase;
    margin-bottom: 1.5rem; display: flex; align-items: center; gap: .75rem;
    opacity: 0; animation: fadeUp .7s .1s ease forwards;
  }
  .hero-tag::before {
    content: ''; display: inline-block; width: 2rem; height: 1px;
    background: var(--cyan); box-shadow: 0 0 8px var(--cyan-glow);
  }
  .hero-trainer-badge {
    display: inline-flex; align-items: center; gap: .4rem;
    background: rgba(0,229,255,.06); border: 1px solid rgba(0,229,255,.25);
    border-radius: 3px; padding: .2rem .6rem;
    font-family: 'Press Start 2P', monospace; font-size: .45rem;
    color: var(--cyan); letter-spacing: .05em;
    box-shadow: 0 0 10px rgba(0,229,255,.1);
  }
  .hero-trainer-badge::before { content: '⚡'; font-size: .5rem; }
  .avail-dot { display: inline-flex; align-items: center; gap: .5rem; }
  .avail-dot::before {
    content: ''; width: 7px; height: 7px; border-radius: 50%;
    background: var(--green); animation: pulseGreen 2s infinite;
  }
  @keyframes pulseGreen {
    0%,100% { box-shadow: 0 0 4px rgba(57,255,20,.7); }
    50% { box-shadow: 0 0 16px rgba(57,255,20,1), 0 0 30px rgba(57,255,20,.4); }
  }
  h1 {
    font-size: clamp(3rem,8vw,6.5rem); font-weight: 800;
    line-height: .95; color: var(--white);
    opacity: 0; animation: fadeUp .7s .2s ease forwards;
  }
  h1 .accent {
    color: transparent; -webkit-text-stroke: 2px var(--cyan);
    filter: drop-shadow(0 0 14px var(--cyan-glow));
  }
  .cursor-blink {
    display: inline-block; width: 4px; height: .85em;
    background: var(--cyan); margin-left: 6px; vertical-align: middle;
    box-shadow: 0 0 10px var(--cyan-glow); animation: blink 1s infinite;
  }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }
  .typing-line {
    font-family: 'Space Mono', monospace;
    font-size: clamp(.85rem,1.8vw,1rem); color: var(--text-dim);
    margin: 1rem 0 0; opacity: 0; animation: fadeUp .7s .3s ease forwards;
  }
  #typed-role { color: var(--cyan); }
  .hero-sub {
    font-size: clamp(.9rem,1.8vw,1.1rem); color: #9ab8c8;
    margin: 1.5rem 0 2.5rem; max-width: 560px; line-height: 1.75;
    opacity: 0; animation: fadeUp .7s .4s ease forwards;
  }
  .hero-sub strong { color: var(--white); }
  .hero-btns {
    display: flex; gap: 1rem; flex-wrap: wrap;
    opacity: 0; animation: fadeUp .7s .55s ease forwards;
  }
  .btn {
    display: inline-flex; align-items: center; gap: .5rem;
    padding: .8rem 1.8rem; border-radius: 3px;
    font-size: .78rem; font-weight: 700; letter-spacing: .1em;
    text-transform: uppercase; text-decoration: none;
    transition: all .25s; font-family: 'Space Mono', monospace; border: none;
  }
  .btn-primary { background: var(--cyan); color: var(--bg); box-shadow: 0 0 20px var(--cyan-glow); }
  .btn-primary:hover { box-shadow: 0 0 40px var(--cyan-glow), 0 0 80px rgba(0,229,255,.12); transform: translateY(-2px); }
  .btn-outline { background: transparent; color: var(--cyan); border: 1px solid var(--cyan); }
  .btn-outline:hover { background: var(--cyan-dim); box-shadow: 0 0 20px var(--cyan-glow); transform: translateY(-2px); }

  .scroll-hint {
    position: absolute; bottom: 2rem; left: 50%; transform: translateX(-50%);
    display: flex; flex-direction: column; align-items: center; gap: .5rem;
    opacity: 0; animation: fadeUp 1s 1.3s ease forwards;
  }
  .scroll-hint span {
    font-family: 'Space Mono', monospace; font-size: .6rem;
    color: #7a9ab0; letter-spacing: .2em; text-transform: uppercase;
  }
  .scroll-line {
    width: 1px; height: 50px; background: linear-gradient(var(--cyan), transparent);
    animation: scrollLine 2s ease-in-out infinite;
  }
  @keyframes scrollLine {
    0%   { transform: scaleY(0); transform-origin: top; }
    50%  { transform: scaleY(1); transform-origin: top; }
    51%  { transform: scaleY(1); transform-origin: bottom; }
    100% { transform: scaleY(0); transform-origin: bottom; }
  }

  /* STATS */
  .stats-bar {
    position: relative; z-index: 1; display: flex;
    max-width: 1100px; margin: 0 auto;
    border: 1px solid var(--border); border-radius: 4px; overflow: hidden;
  }
  .stat {
    flex: 1; padding: 2rem; border-right: 1px solid var(--border);
    transition: background .3s; position: relative; overflow: hidden;
  }
  .stat::before {
    content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px;
    background: linear-gradient(90deg, var(--cyan), transparent);
    transform: scaleX(0); transform-origin: left; transition: transform .4s;
  }
  .stat:hover::before { transform: scaleX(1); }
  .stat:last-child { border-right: none; }
  .stat:hover { background: var(--cyan-dim); }
  .stat-num {
    font-family: 'Space Mono', monospace; font-size: 2.2rem;
    font-weight: 700; color: var(--cyan); display: block;
    text-shadow: 0 0 20px var(--cyan-glow);
  }
  .stat-label {
    font-size: .72rem; color: #7a9ab0;
    text-transform: uppercase; letter-spacing: .08em;
    margin-top: .3rem; display: block;
  }

  /* SECTIONS */
  section {
    position: relative; z-index: 1;
    max-width: 1100px; margin: 0 auto; padding: 6rem 3rem;
  }
  .section-label {
    font-family: 'Space Mono', monospace; font-size: .7rem;
    color: var(--cyan); letter-spacing: .25em; text-transform: uppercase;
    margin-bottom: .75rem; display: flex; align-items: center; gap: .75rem;
  }
  .section-label::after { content: ''; flex: 1; height: 1px; background: var(--border); }
  h2 {
    font-size: clamp(1.8rem,4vw,2.8rem); font-weight: 800;
    color: var(--white); margin-bottom: 3rem; line-height: 1.1;
  }

  /* REVEAL */
  .reveal { opacity: 0; transform: translateY(30px); transition: opacity .7s ease, transform .7s ease; }
  .reveal.visible { opacity: 1; transform: translateY(0); }

  /* SKILLS */
  .skills-grid {
    display: grid; grid-template-columns: repeat(auto-fill, minmax(280px,1fr));
    gap: 1px; background: var(--border); border: 1px solid var(--border); border-radius: 4px; overflow: hidden;
  }
  .skill-card {
    background: var(--card); padding: 1.75rem; transition: background .3s; position: relative; overflow: hidden;
  }
  .skill-card::after {
    content: ''; position: absolute; bottom: 0; left: 0; right: 0; height: 1px;
    background: linear-gradient(90deg, transparent, var(--cyan), transparent);
    opacity: 0; transition: opacity .3s;
  }
  .skill-card:hover { background: #0d1820; }
  .skill-card:hover::after { opacity: 1; }
  .skill-category {
    font-family: 'Press Start 2P', monospace; font-size: .42rem;
    color: var(--bg); letter-spacing: .05em; text-transform: uppercase;
    margin-bottom: 1rem; display: inline-block;
    background: var(--green); padding: .25rem .55rem; border-radius: 3px;
    box-shadow: 0 0 10px rgba(57,255,20,.3);
  }
  .skill-card:nth-child(1) .skill-category { background: var(--cyan); color: var(--bg); box-shadow: 0 0 10px var(--cyan-glow); }
  .skill-card:nth-child(2) .skill-category { background: #a78bfa; color: var(--bg); box-shadow: 0 0 10px rgba(167,139,250,.3); }
  .skill-card:nth-child(3) .skill-category { background: #fb923c; color: var(--bg); box-shadow: 0 0 10px rgba(251,146,60,.3); }
  .skill-card:nth-child(4) .skill-category { background: #34d399; color: var(--bg); box-shadow: 0 0 10px rgba(52,211,153,.3); }
  .skill-card:nth-child(5) .skill-category { background: #f472b6; color: var(--bg); box-shadow: 0 0 10px rgba(244,114,182,.3); }
  .skill-card:nth-child(6) .skill-category { background: #60a5fa; color: var(--bg); box-shadow: 0 0 10px rgba(96,165,250,.3); }
  .skill-tags { display: flex; flex-wrap: wrap; gap: .5rem; }
  .tag {
    background: rgba(57,255,20,.08); border: 1px solid rgba(57,255,20,.2);
    color: #c8dce8; font-size: .78rem; padding: .3rem .75rem;
    border-radius: 2px; font-family: 'Space Mono', monospace; transition: all .2s;
  }
  .tag:hover {
    background: var(--green-dim); border-color: var(--green);
    color: var(--green); box-shadow: 0 0 10px rgba(57,255,20,.2); transform: translateY(-1px);
  }
  .tag.learning { background: rgba(0,229,255,.08); border-color: rgba(0,229,255,.2); }
  .tag.learning:hover {
    background: var(--cyan-dim); border-color: var(--cyan);
    color: var(--cyan); box-shadow: 0 0 10px var(--cyan-glow);
  }

  /* PROJECTS */
  .projects-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px,1fr)); gap: 1.5rem; }
  .project-card {
    background: var(--card); border: 1px solid var(--border); border-radius: 4px; padding: 2rem;
    position: relative; overflow: hidden;
    transition: border-color .3s, transform .35s cubic-bezier(.34,1.56,.64,1), box-shadow .3s;
    text-decoration: none; display: block; color: inherit;
  }
  .project-card::after {
    content: ''; position: absolute; top: -50%; left: -60%;
    width: 40%; height: 200%;
    background: linear-gradient(105deg, transparent 40%, rgba(0,229,255,.06) 50%, transparent 60%);
    transform: rotate(5deg); transition: left .6s ease; pointer-events: none;
  }
  .project-card:hover::after { left: 130%; }
  .project-card::before {
    content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px;
    background: linear-gradient(90deg, var(--cyan), var(--green)); opacity: 0; transition: opacity .3s;
  }
  .project-card:hover { border-color: rgba(0,229,255,.45); transform: translateY(-6px) scale(1.015); box-shadow: 0 20px 60px rgba(0,0,0,.5), 0 0 30px var(--cyan-dim); }
  .project-card:hover::before { opacity: 1; }
  .project-icon { font-size: 2rem; margin-bottom: 1rem; display: block; transition: transform .3s; }
  .project-card:hover .project-icon { transform: scale(1.2) rotate(-5deg); }
  .project-title { font-size: 1rem; font-weight: 700; color: var(--white); margin-bottom: .75rem; transition: color .2s; }
  .project-card:hover .project-title { color: var(--cyan); }
  .project-desc { font-size: .84rem; color: #9ab8c8; line-height: 1.7; margin-bottom: 1.25rem; }
  /* EXP bar — Pokémon-style progress indicator */
  .project-exp {
    display: flex; align-items: center; gap: .5rem; margin-bottom: 1rem;
  }
  .project-exp-label {
